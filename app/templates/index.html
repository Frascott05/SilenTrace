{% extends 'base.html' %}
{% block content %}
<h1>Indagini</h1>
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">Nuova Indagine</button>

<div class="row mt-4">
    {% for inv in investigations %}
    <div class="col-md-4">
        <div class="card mb-3">
            <div class="card-body">
                <h5>{{ inv.name }}</h5>
                <p>ID: {{ inv.id }}</p>
                <p>Creato: {{ inv.created_at }}</p>
                <p>Aggiornato: {{ inv.updated_at }}</p>
                <a href="/api/investigation/details/{{ inv.id }}" class="btn btn-info">Apri</a>
                <button class="btn btn-warning edit-btn" 
                  data-id="{{ inv.id }}" 
                  data-name="{{ inv.name }}" 
                  data-emails="{{ inv.users | map(attribute='email') | join(',') }}"
                  data-bs-toggle="modal" data-bs-target="#editModal">Modifica</button>
                <form method="POST" action="/api/investigation/delete/{{ inv.id }}" style="display:inline;">
                  <button type="submit" class="btn btn-danger" onclick="return confirm('Sei sicuro di voler eliminare questa investigation?');">Delete</button>
                </form>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<!-- Modal Create -->
<div class="modal fade" id="createModal">
  <div class="modal-dialog">
    <form method="POST" action="/api/investigation/create" enctype="multipart/form-data" class="modal-content">
      <div class="modal-header">
        <h5>Nuova Indagine</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input class="form-control mb-2" name="name" placeholder="Nome">
        <input class="form-control mb-2" name="emails" placeholder="Email separate da virgola">
        <input class="form-control mb-2" name="filename" placeholder="Nome del file">
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary">Salva</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal Update -->
<div class="modal fade" id="editModal">
  <div class="modal-dialog">
    <form method="POST" enctype="multipart/form-data" class="modal-content">
      <div class="modal-header">
        <h5>Modifica Indagine</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input class="form-control mb-2" name="name">
        <input class="form-control mb-2" name="emails">
        <input class="form-control mb-2" type="text" name="filename">
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary">Salva</button>
      </div>
    </form>
  </div>
</div>

<script>
document.querySelectorAll('.edit-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const modal = document.getElementById('editModal');
    modal.querySelector('form').action = '/api/investigation/update/' + btn.dataset.id;
    modal.querySelector('[name="name"]').value = btn.dataset.name;
    modal.querySelector('[name="emails"]').value = btn.dataset.emails;
    modal.querySelector('[name="filename"]').value = btn.dataset.filename;
  });
});
</script>
{% endblock %}
